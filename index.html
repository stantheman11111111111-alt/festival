<!DOCTYPE html>
<html>
<head>
  <title>Festival Scheduler</title>

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }

    /* HEADER */
    .header {
      background: #0078d4;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .header img {
      height: 90px;
      display: block;
      margin: 0 auto 10px auto;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
    }

    /* CONTAINER */
    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 0;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    /* SHIFT GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }

    /* SHIFT BUTTONS */
    .chip {
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
    }

    .chip input {
      display: none;
    }

    .chip span {
      display: block;
      padding: 5px;
      border-radius: 20px;
    }

    .chip input:checked + span {
      background: #0078d4;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #005ea6;
    }

  </style>
</head>

<body>

<!-- ✅ HEADER (FIXED LOGO) -->
<div class="header">
  <img src="logo.jpg">
  <h1>Guelph Multicultural Festival Signup</h1>
</div>

<div class="container">

<div class="card">

<h2>Volunteer Information</h2>

<select id="approved">
  <option>Approved</option>
  <option>Not Yet Approved</option>
</select>

<input id="first" placeholder="First Names (include family)">
<input id="last" placeholder="Last Name">

<select id="congregation">
  <option>Hanlon</option>
  <option>Willow Park</option>
  <option>Lakeview</option>
  <option>Central Tagalog</option>
  <option>Forest Heights</option>
</select>

<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="lang" placeholder="Languages">

<textarea id="comments" placeholder="Comments"></textarea>

<h2>Friday</h2>
<div class="grid">
<label class="chip"><input type="checkbox" value="fri_setup_m"><span>Setup AM</span></label>
<label class="chip"><input type="checkbox" value="fri_setup_a"><span>Setup PM</span></label>
<label class="chip"><input type="checkbox" value="fri_5"><span>5PM</span></label>
<label class="chip"><input type="checkbox" value="fri_6"><span>6PM</span></label>
<label class="chip"><input type="checkbox" value="fri_7"><span>7PM</span></label>
<label class="chip"><input type="checkbox" value="fri_8"><span>8PM</span></label>
<label class="chip"><input type="checkbox" value="fri_close"><span>Close</span></label>
</div>

<h2>Saturday</h2>
<div class="grid">
<label class="chip"><input type="checkbox" value="sat_9"><span>9AM</span></label>
<label class="chip"><input type="checkbox" value="sat_10"><span>10AM</span></label>
<label class="chip"><input type="checkbox" value="sat_11"><span>11AM</span></label>
<label class="chip"><input type="checkbox" value="sat_12"><span>12PM</span></label>
<label class="chip"><input type="checkbox" value="sat_13"><span>1PM</span></label>
<label class="chip"><input type="checkbox" value="sat_14"><span>2PM</span></label>
<label class="chip"><input type="checkbox" value="sat_15"><span>3PM</span></label>
<label class="chip"><input type="checkbox" value="sat_16"><span>4PM</span></label>
<label class="chip"><input type="checkbox" value="sat_17"><span>5PM</span></label>
<label class="chip"><input type="checkbox" value="sat_18"><span>6PM</span></label>
<label class="chip"><input type="checkbox" value="sat_19"><span>7PM</span></label>
<label class="chip"><input type="checkbox" value="sat_20"><span>8PM</span></label>
<label class="chip"><input type="checkbox" value="sat_21"><span>Close</span></label>
</div>

<h2>Sunday</h2>
<div class="grid">
<label class="chip"><input type="checkbox" value="sun_10"><span>10AM</span></label>
<label class="chip"><input type="checkbox" value="sun_11"><span>11AM</span></label>
<label class="chip"><input type="checkbox" value="sun_12"><span>12PM</span></label>
<label class="chip"><input type="checkbox" value="sun_13"><span>1PM</span></label>
<label class="chip"><input type="checkbox" value="sun_14"><span>2PM</span></label>
<label class="chip"><input type="checkbox" value="sun_15"><span>3PM</span></label>
<label class="chip"><input type="checkbox" value="sun_16"><span>4PM</span></label>
<label class="chip"><input type="checkbox" value="sun_17"><span>5PM</span></label>
<label class="chip"><input type="checkbox" value="sun_18"><span>Pack</span></label>
</div>

<button onclick="submitForm()">Submit Availability</button>

</div>

</div>

<script>

let people = [];

function submitForm() {

  let email = document.getElementById("email").value;

  if (people.some(p => p.email === email)) {
    alert("Already submitted");
    return;
  }

  alert("Submitted successfully!");
}

</script>

</body>
</html>
