<!DOCTYPE html>
<html>
<head>
  <title>Festival Scheduler</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f5f9;
      margin: 0;
    }

    .header {
      background: #0078d4;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .header img {
      height: 140px;
      margin-bottom: 10px;
    }

    .container {
      max-width: 950px;
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .chip {
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
    }

    .chip input {
      display: none;
    }

    .chip input:checked + span {
      background: #0078d4;
      color: white;
      border-radius: 20px;
      padding: 6px;
      display: inline-block;
    }

    button {
      background: #0078d4;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .success {
      text-align: center;
      padding: 30px;
      font-size: 18px;
    }

  </style>
</head>

<body>

<div class="header">
  <!-- ✅ YOUR LOGO -->
  <img src="st,small,507x507-pad,600x600,f8f8f8.jpg">
  <div>Guelph Multicultural Festival Signup</div>
</div>

<div class="container">

<!-- ✅ FORM -->
<div class="card" id="formCard">

<h3>Volunteer Information</h3>

<select id="approved">
  <option>Approved</option>
  <option>Not Yet Approved</option>
</select>

<input id="first" placeholder="First Names">
<input id="last" placeholder="Last Name">

<select id="congregation">
  <option>Hanlon</option>
  <option>Willow Park</option>
  <option>Lakeview</option>
  <option>Other</option>
</select>

<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="lang" placeholder="Languages">

<textarea id="comments" placeholder="Comments"></textarea>

<h3>Shifts</h3>

<div class="grid">
<label class="chip"><input type="checkbox" value="fri_5"><span>Fri 5 PM</span></label>
<label class="chip"><input type="checkbox" value="fri_6"><span>Fri 6 PM</span></label>
<label class="chip"><input type="checkbox" value="sat_10"><span>Sat 10 AM</span></label>
<label class="chip"><input type="checkbox" value="sat_14"><span>Sat 2 PM</span></label>
<label class="chip"><input type="checkbox" value="sun_12"><span>Sun 12 PM</span></label>
<label class="chip"><input type="checkbox" value="sun_15"><span>Sun 3 PM</span></label>
</div>

<button onclick="submitForm()">Submit</button>

</div>

<!-- ✅ SUCCESS SCREEN -->
<div class="card hidden" id="successCard">
  <div class="success">
    ✅ Thank you! Your availability has been submitted.<br><br>
    You will be contacted when scheduling is finalized.
  </div>
</div>

<!-- ✅ ADMIN -->
<div class="card">
<h3>Admin Panel</h3>

<input id="adminPass" placeholder="Enter Admin Password">
<button onclick="unlockAdmin()">Unlock</button>

<div id="adminArea" class="hidden">
  <button onclick="assign()">Auto Assign</button>
  <button onclick="clearAll()">Clear</button>
  <div id="result"></div>
</div>

</div>

</div>

<script>

let people = [];
let adminUnlocked = false;

// ✅ SUBMIT FORM (WITH DUPLICATE CHECK)
function submitForm() {

  let email = document.getElementById("email").value;

  // prevent duplicates
  let exists = people.some(p => p.email === email);
  if (exists) {
    alert("You have already submitted!");
    return;
  }

  let checks = document.querySelectorAll("input[type=checkbox]:checked");
  let avail = {};
  checks.forEach(c => avail[c.value] = true);

  people.push({
    name: document.getElementById("first").value + " " + document.getElementById("last").value,
    email: email,
    congregation: document.getElementById("congregation").value,
    lang: document.getElementById("lang").value,
    availability: avail,
    total: 0
  });

  // ✅ SHOW SUCCESS SCREEN
  document.getElementById("formCard").classList.add("hidden");
  document.getElementById("successCard").classList.remove("hidden");
}

// ✅ ADMIN PASSWORD
function unlockAdmin() {
  let pass = document.getElementById("adminPass").value;

  if (pass === "admin123") {
    adminUnlocked = true;
    document.getElementById("adminArea").classList.remove("hidden");
  } else {
    alert("Wrong password");
  }
}

// ✅ AUTO ASSIGN
function assign() {
  let shifts = Object.keys(people.flatMap(p => Object.keys(p.availability)));

  people.forEach(p => p.total = 0);

  shifts.forEach(shift => {
    let available = people.filter(p => p.availability[shift]);

    available.sort((a,b) => a.total - b.total);
    let selected = available.slice(0,4);

    selected.forEach(p => p.total++);
  });

  render();
}

// ✅ CLEAR
function clearAll() {
  people = [];
  render();
}

// ✅ DISPLAY
function render() {
  let html = "<table><tr><th>Name</th><th>Email</th><th>Total</th></tr>";

  people.forEach(p => {
    html += `<tr>
      <td>${p.name}</td>
      <td>${p.email}</td>
      <td>${p.total}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
